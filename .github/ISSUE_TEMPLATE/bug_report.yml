name: Bug report
description: Something in GitMob isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security vulnerabilities**, do not file here — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce, expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Daemon output / errors
      description: Relevant lines from the `gitmob` daemon console or any error codes the UI showed.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: GitMob version / commit
      placeholder: "v0.1.0 or a commit SHA"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Toolchain versions
      description: Output of `bun --version` and `git --version`.
      placeholder: "bun 1.3.14, git 2.52"
    validations:
      required: false
