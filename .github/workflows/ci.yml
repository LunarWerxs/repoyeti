name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  daemon:
    name: daemon (test + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # pin so a Bun upgrade can't silently change the build
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run check # ApiErrorCode drift guard + architectural boundary guard
      - run: bun run check:coverage # runs the suite with coverage + an overall-% floor

  web:
    name: web (i18n + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-web-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
          restore-keys: bun-web-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run i18n:check # fail on untranslated strings / missing keys / locale parity drift
      - run: bun run build # vue-tsc type-check + production bundle (re-runs i18n:check)
