<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <!-- Mobile browser-chrome tint. The shared theme composable flips `content` between
         these on light/dark; RepoYeti keeps its brand near-black #0e0e12 for dark. -->
    <meta
      name="theme-color"
      content="#0e0e12"
      data-theme-color-dark="#0e0e12"
      data-theme-color-light="#ffffff"
    />
    <meta name="color-scheme" content="dark light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RepoYeti" />
    <!-- Standalone yeti medallion; swapped to the black-disc variant on light browser chrome.
         icon.svg (the white-disc/dark-UI variant) is the default for dark chrome + older browsers. -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon-light.svg" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>RepoYeti</title>
    <script>
      // No-flash theme boot: apply the stored theme before Vue mounts. MUST match the
      // shared kit composable (lib/theme.ts) — same key `lunarwerx-theme`, same resolve
      // logic, default dark (preserves RepoYeti's identity). See kit README.
      (() => {
        try {
          const mode = localStorage.getItem("lunarwerx-theme") || "dark";
          const dark =
            mode === "dark" ||
            (mode === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          const html = document.documentElement;
          html.classList.toggle("dark", dark);
          html.dataset.theme = mode;
          html.style.colorScheme = dark ? "dark" : "light";
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
