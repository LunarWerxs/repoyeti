<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0e0e12" />
    <meta name="color-scheme" content="dark light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RepoYeti" />
    <!-- Standalone yeti medallion; swapped to the black-disc variant on light browser chrome.
         icon.svg (the white-disc/dark-UI variant) is the default for dark chrome + older browsers. -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon-light.svg" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>RepoYeti</title>
    <script>
      // Apply the saved theme before Vue mounts so there's no light/dark flash.
      // RepoYeti defaults to dark when nothing is stored (preserves its identity).
      (function () {
        try {
          var s = localStorage.getItem("vueuse-color-scheme") || "dark";
          var dark =
            s === "dark" ||
            (s === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
